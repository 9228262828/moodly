<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moodly</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #8b7cf6;
      --dark: #241b3d;
      --bg: #f8f5ff;
      --card: #ffffff;
      --muted: #6b5a7a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: var(--dark);
      background: var(--bg);
      line-height: 1.6;
    }

    main {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: clamp(24px, 6vw, 44px);
      box-shadow: 0 24px 60px rgba(36, 27, 61, .10);
    }

    .mark {
      display: inline-grid;
      width: 72px;
      height: 72px;
      place-items: center;
      margin-bottom: 20px;
      border-radius: 22px;
      color: var(--primary);
      background: rgba(139, 124, 246, .14);
      font-size: 40px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2.5rem, 9vw, 4.5rem);
      line-height: 1;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: var(--primary);
      font-weight: 800;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      color: #fff;
      background: var(--primary);
      text-decoration: none;
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 4px;
    }

    footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: .95rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="title">
      <div class="mark" aria-hidden="true">M</div>
      <h1 id="title">Moodly</h1>
      <p>Track your mood, one day at a time.</p>
      <p>
        Moodly is a simple, local-only mood tracker. Entries and settings stay
        on your device. Moodly does not use login, backend servers, Firebase,
        ads, analytics, or notifications.
      </p>
      <div class="links" aria-label="Policy links">
        <a class="button" href="privacy-policy.html">Privacy Policy</a>
        <a class="text-link" href="terms-conditions.html">Terms &amp; Conditions</a>
      </div>
    </section>
    <footer>Version 1.0.0</footer>
  </main>
</body>
</html>
